services:
  frontend:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_GEMINI_KEY=${VITE_GEMINI_KEY}

  backend:
    image: bitnami/laravel:latest
    ports:
      - "8000:8000"
    volumes:
      - ./backend-laravel:/app
    environment:
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/app/database/database.sqlite
    command: php artisan serve --host=0.0.0.0 --port=8000